{% extends "base.html" %}

{% block content %}

<h1>Create Customer</h1>

<form method="post">

<label>
Name
<input type="text" name="name" required>
</label>

<button type="submit">
Create Customer

</form>

<p>
<a href="/ui/customers">← Back to customers</a>
</p>

{% endblock %}
